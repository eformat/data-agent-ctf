                  name: authbridge-environments
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_TOKEN_EXCHANGE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: authbridge-environments
                  key: KEYCLOAK_TOKEN_EXCHANGE_ENABLED
            - name: KEYCLOAK_CLIENT_REGISTRATION_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: authbridge-environments
                  key: KEYCLOAK_CLIENT_REGISTRATION_ENABLED
            - name: CLIENT_NAME
              value: retail-ops-mcp
            - name: SECRET_FILE_PATH
              value: /shared/client-secret.txt
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: password
          securityContext:
            seLinuxOptions:
              type: spc_t
          volumeMounts:
            - name: shared-data
              mountPath: /shared
            - name: svid-output
              mountPath: /opt
        - name: envoy-proxy
          image: ghcr.io/kagenti/kagenti-extensions/authbridge-envoy:v0.6.0-alpha.9
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/authbridge/config.yaml"]
          ports:
            - containerPort: 15123
            - containerPort: 15124
          env:
            - name: TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: authbridge-proxy-config
                  key: TOKEN_URL
            - name: ISSUER
              valueFrom:
                secretKeyRef:
                  name: authbridge-proxy-config
                  key: ISSUER
            - name: TARGET_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: authbridge-proxy-config
                  key: TARGET_AUDIENCE
            - name: TARGET_SCOPES
              valueFrom:
                secretKeyRef:
                  name: authbridge-proxy-config
                  key: TARGET_SCOPES
            - name: CLIENT_ID_FILE
              value: /shared/client-id.txt
            - name: CLIENT_SECRET_FILE
              value: /shared/client-secret.txt
            - name: ROUTES_CONFIG_PATH
              value: /etc/authproxy/routes.yaml
          securityContext:
            runAsUser: 1337
            runAsGroup: 1337
            seLinuxOptions:
              type: spc_t
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
            - name: authproxy-routes
              mountPath: /etc/authproxy
              readOnly: true
            - name: envoy-config-real
              mountPath: /etc/envoy
              readOnly: true
            - name: ab-runtime
              mountPath: /etc/authbridge
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: retail-ops-config
        - name: shared-data
          emptyDir: {}
        - name: svid-output
          emptyDir: {}
        - name: spire-agent-socket
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: authbridge-spiffe-helper-config
          configMap:
            name: authbridge-spiffe-helper-config
        - name: authproxy-routes
          configMap:
            name: authproxy-routes
        - name: envoy-config-real
          configMap:
            name: authbridge-envoy-config-shared
        - name: ab-runtime
          configMap:
            name: authbridge-runtime-config
---
apiVersion: v1
kind: Service
metadata:
  name: retail-ops-mcp
spec:
  selector:
    app: retail-ops-mcp
  ports:
    - port: 9090
      targetPort: 15124
