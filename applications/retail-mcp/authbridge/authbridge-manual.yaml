---
# AuthBridge manual sidecar resources for MCP servers.
# Pattern from zero-trust-agent-demo — no webhook injection needed.

# Client registration environment (non-secret values only)
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-environments
  namespace: openshell
data:
  SPIRE_ENABLED: "true"
  KEYCLOAK_URL: "https://keycloak-openshell.apps.prelude-m6wl4-jf54l.sandbox1832.opentlc.com"
  KEYCLOAK_REALM: "retail-ctf"
  KEYCLOAK_TOKEN_EXCHANGE_ENABLED: "true"
  KEYCLOAK_CLIENT_REGISTRATION_ENABLED: "true"
---
# SPIFFE Helper config — reads SVID from SPIRE agent socket
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-spiffe-helper-config
  namespace: openshell
data:
  helper.conf: |
    agent_address = "/run/spire/agent-sockets/spire-agent.sock"
    cmd = ""
    cmd_args = ""
    svid_file_name = "/opt/svid.pem"
    svid_key_file_name = "/opt/svid_key.pem"
    svid_bundle_file_name = "/opt/svid_bundle.pem"
    jwt_svids = [{jwt_audience="retail-demo", jwt_svid_file_name="/opt/jwt_svid.token"}]
    jwt_svid_file_mode = 0644
    include_federated_domains = true

---
# AuthBridge runtime config — inbound JWT validation only.
# The outbound token-exchange plugin requires identity.type config we don't use.
# authbridge-envoy reads this at startup to configure the ext_proc pipeline.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-runtime-config
  namespace: openshell
data:
  config.yaml: |
    listen_port: 9095
    pipeline:
      inbound:
        plugins:
          - name: jwt-validation
            config:
              issuer: "https://keycloak-openshell.apps.prelude-m6wl4-jf54l.sandbox1832.opentlc.com/realms/retail-ctf"
              keycloak_url: "https://keycloak-openshell.apps.prelude-m6wl4-jf54l.sandbox1832.opentlc.com"
              keycloak_realm: "retail-ctf"
    routes:
      file: "/etc/authproxy/routes.yaml"

---
# AuthBridge proxy config — token exchange endpoints
apiVersion: v1
kind: Secret
metadata:
  name: authbridge-proxy-config
  namespace: openshell
type: Opaque
stringData:
  TOKEN_URL: "https://keycloak-openshell.apps.prelude-m6wl4-jf54l.sandbox1832.opentlc.com/realms/retail-ctf/protocol/openid-connect/token"
  ISSUER: "https://keycloak-openshell.apps.prelude-m6wl4-jf54l.sandbox1832.opentlc.com/realms/retail-ctf"
  TARGET_AUDIENCE: "retail-mcp"
  TARGET_SCOPES: "openid"

---
# AuthProxy routes — passthrough for internal services, exchange for MCP
apiVersion: v1
kind: ConfigMap
metadata:
  name: authproxy-routes
  namespace: openshell
data:
  routes.yaml: |
    - host: "kubernetes**"
      action: passthrough
    - host: "dev.spicedb**"
      action: passthrough
    - host: "trino**"
      action: passthrough
    - host: "**"
      target_audience: "retail-mcp"
      token_scopes: "openid"

---
# SCC RoleBinding — privileged SCC for AuthBridge init container
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-authbridge-scc-privileged
  namespace: openshell
subjects:
  - kind: ServiceAccount
    name: default
    namespace: openshell
  - kind: ServiceAccount
    name: retail-finance-mcp
    namespace: openshell
  - kind: ServiceAccount
    name: retail-sales-mcp
    namespace: openshell
  - kind: ServiceAccount
    name: retail-ops-mcp
    namespace: openshell
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:privileged
  apiGroup: rbac.authorization.k8s.io
