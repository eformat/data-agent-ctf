---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - sandbox-job.yaml
configMapGenerator:
  - name: sandbox-policy
    files:
      - policy-retail.yaml
  - name: sandbox-providers
    files:
      - providers/maas-inference.yaml
generatorOptions:
  disableNameSuffixHash: true
