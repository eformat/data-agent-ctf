kind: Kustomization
resources:
  - sandbox-crs.yaml
  - sandbox-job.yaml
configMapGenerator:
  - name: sandbox-policy
    files:
      - policy-retail.yaml
      - sandbox-policy.rego
      - sandbox-start.sh
generatorOptions:
  disableNameSuffixHash: true
