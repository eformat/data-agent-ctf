---
apiVersion: batch/v1
kind: Job
metadata:
  name: retail-sandbox-deploy
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
      serviceAccountName: sandbox-deployer
      containers:
        - name: deploy
          image: quay.io/eformat/openshell-deployer:latest
          command: ["/bin/bash", "/scripts/deploy-sandboxes.sh"]
          envFrom:
            - secretRef:
                name: sandbox-secrets
          env:
            - name: HOME
              value: "/tmp"
            - name: HERMES_IMAGE
              value: "quay.io/eformat/hermes-openshell:latest"
            - name: KEYCLOAK_ISSUER
              value: ""
            - name: KEYCLOAK_CLIENT_ID
              value: "hermes-dashboard"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: policy
              mountPath: /policy
      volumes:
        - name: scripts
          configMap:
            name: sandbox-deploy-scripts
        - name: policy
          configMap:
            name: sandbox-policy
      restartPolicy: OnFailure
# Secret sandbox-secrets is in ../secrets.enc.yaml (sops encrypted)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-deployer
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get"]
  - apiGroups: ["config.openshift.io"]
    resources: ["ingresses"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-deployer
subjects:
  - kind: ServiceAccount
    name: sandbox-deployer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-deployer-ingress
subjects:
  - kind: ServiceAccount
    name: sandbox-deployer
    namespace: openshell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-reader
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-deploy-scripts
data:
  deploy-sandboxes.sh: |
    #!/bin/bash
    set -uo pipefail

    GATEWAY_NAME="${OPENSHELL_GATEWAY:-ctf}"
    GATEWAY_ENDPOINT="${OPENSHELL_GATEWAY_ENDPOINT:-https://openshell:8080}"
    NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo "openshell")

    echo "=== Setting up mTLS certs ==="
    MTLS_DIR="$HOME/.config/openshell/gateways/${GATEWAY_NAME}/mtls"
    mkdir -p "$MTLS_DIR"
    oc get secret openshell-ca-tls -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}' | base64 -d > "$MTLS_DIR/ca.crt"
    oc get secret openshell-client-tls -n "$NAMESPACE" -o jsonpath='{.data.tls\.crt}' | base64 -d > "$MTLS_DIR/tls.crt"
    oc get secret openshell-client-tls -n "$NAMESPACE" -o jsonpath='{.data.tls\.key}' | base64 -d > "$MTLS_DIR/tls.key"

    echo "=== Registering gateway ==="
    openshell gateway add --name "$GATEWAY_NAME" --local "$GATEWAY_ENDPOINT"

    echo "=== Checking gateway ==="
    openshell status -g "$GATEWAY_NAME"

    APPS_DOMAIN=$(oc get ingresses.config cluster -o jsonpath='{.spec.domain}' 2>/dev/null || echo "apps.example.com")

    if [ -z "${KEYCLOAK_ISSUER:-}" ]; then
      KC_HOST=$(oc get route keycloak -n "${NAMESPACE}" -o jsonpath='{.spec.host}' 2>/dev/null)
      KEYCLOAK_ISSUER="https://${KC_HOST}/realms/retail-ctf"
    fi
    echo "  KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}"
    echo "  APPS_DOMAIN=${APPS_DOMAIN}"

    for dept in finance sales ops; do
      name="retail-${dept}"
      echo "=== Deploying ${name} ==="

      # Generate per-department OPA policy
      sed "/retail-.*-mcp/{/retail-${dept}-mcp/!{N;d;}}" \
          /policy/policy-retail.yaml > "/tmp/policy-${dept}.yaml"

      # Delete existing sandbox (ignore if not found)
      openshell sandbox delete "$name" -g "$GATEWAY_NAME" 2>/dev/null || true
      sleep 3

      # Create sandbox with policy and hermes startup
      openshell sandbox create -g "$GATEWAY_NAME" \
        --name "$name" \
        --from "$HERMES_IMAGE" \
        --policy "/tmp/policy-${dept}.yaml" \
        --no-tty \
        -- env OPENAI_API_KEY="${OPENAI_API_KEY}" \
               GATEWAY_ALLOW_ALL_USERS=true \
               HERMES_ACTIVE_PROFILE="retail-${dept}" \
               HERMES_DASHBOARD_OIDC_ISSUER="${KEYCLOAK_ISSUER}" \
               HERMES_DASHBOARD_OIDC_CLIENT_ID="${KEYCLOAK_CLIENT_ID}" \
               HERMES_PUBLIC_URL="https://${name}.${APPS_DOMAIN}" \
               /usr/local/bin/hermes-start.sh

      # Wait for Ready
      for i in $(seq 1 40); do
        status=$(openshell sandbox list -g "$GATEWAY_NAME" 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g' | grep "$name" | awk '{print $NF}' || true)
        if [ "$status" = "Ready" ]; then echo "  ${name}: Ready"; break; fi
        echo "  ${name}: ${status:-not found} (${i}/40)"
        sleep 10
      done

      # Expose service
      openshell service expose "$name" 9119 -g "$GATEWAY_NAME" 2>&1 || true

      rm -f "/tmp/policy-${dept}.yaml"
      echo "  ${name}: https://${name}.${APPS_DOMAIN}"
    done

    echo "=== All sandboxes deployed ==="
