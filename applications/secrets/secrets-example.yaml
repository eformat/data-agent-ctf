# Example secrets file — copy to secrets.enc.yaml and encrypt with sops.
# See README.md in this directory for instructions.
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
type: Opaque
stringData:
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: trino-credentials
type: Opaque
stringData:
  S3_ACCESS_KEY: minio
  S3_SECRET_KEY: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: spicedb-config
type: Opaque
stringData:
  preshared_key: CHANGE_ME
  datastore_uri: postgres://spicedb:spicedb@spicedb-postgres:5432/spicedb?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: spicedb-token
type: Opaque
stringData:
  SPICEDB_TOKEN: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgres-credentials
type: Opaque
stringData:
  username: keycloak
  password: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
type: Opaque
stringData:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: CHANGE_ME
  CTF_USER_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: authbridge-keycloak-admin
type: Opaque
stringData:
  KEYCLOAK_ADMIN_USERNAME: temp-admin
  KEYCLOAK_ADMIN_PASSWORD: CHANGE_ME
