---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: keycloak-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
spec:
  secretName: keycloak-tls
  issuerRef:
    name: keycloak-selfsigned
    kind: Issuer
  dnsNames:
    - keycloak-service
    - keycloak-service.data-agent-ctf.svc
    - keycloak-service.data-agent-ctf.svc.cluster.local
  duration: 8760h
  renewBefore: 720h
