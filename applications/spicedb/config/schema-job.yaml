---
apiVersion: batch/v1
kind: Job
metadata:
  name: spicedb-schema-load
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
      initContainers:
        - name: wait-and-load-schema
          image: quay.io/eformat/toolbox:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              SPICEDB_HTTP="http://${SPICEDB_HOST}:${SPICEDB_HTTP_PORT}"

              echo "Waiting for SpiceDB HTTP API at ${SPICEDB_HTTP}..."
              for i in $(seq 1 60); do
                if curl -sf "${SPICEDB_HTTP}/v1/schema/read" \
                    -H "Authorization: Bearer ${SPICEDB_TOKEN}" \
                    -d '{}' >/dev/null 2>&1; then
                  echo "SpiceDB is ready"
                  break
                fi
                echo "  waiting... ($i/60)"
                sleep 5
              done

              echo "Loading schema..."
              SCHEMA=$(cat /config/schema.zed)
              curl -sf "${SPICEDB_HTTP}/v1/schema/write" \
                -H "Authorization: Bearer ${SPICEDB_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"schema\": $(echo "$SCHEMA" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}" \
                >/dev/null
              echo "Schema loaded"
          env:
            - name: SPICEDB_HOST
              value: "dev"
            - name: SPICEDB_HTTP_PORT
              value: "8443"
            - name: SPICEDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spicedb-token
                  key: SPICEDB_TOKEN
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: load-fixtures
          image: quay.io/eformat/toolbox:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              SPICEDB_HTTP="http://${SPICEDB_HOST}:${SPICEDB_HTTP_PORT}"

              echo "Loading fixtures..."
              while IFS='|' read -r resource relation subject; do
                [ -z "$resource" ] && continue
                res_type="${resource%%:*}"
                res_id="${resource#*:}"
                subj_type="${subject%%:*}"
                subj_rest="${subject#*:}"
                subj_id="${subj_rest%%#*}"
                if [ "$subj_rest" != "$subj_id" ]; then
                  subj_rel="${subj_rest#*#}"
                  subj_obj="{\"object\":{\"objectType\":\"${subj_type}\",\"objectId\":\"${subj_id}\"},\"optionalRelation\":\"${subj_rel}\"}"
                else
                  subj_obj="{\"object\":{\"objectType\":\"${subj_type}\",\"objectId\":\"${subj_id}\"}}"
                fi
                resp=$(curl -s -w '%{http_code}' -o /dev/null "${SPICEDB_HTTP}/v1/relationships/write" \
                  -H "Authorization: Bearer ${SPICEDB_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"updates\":[{\"operation\":\"OPERATION_TOUCH\",\"relationship\":{\"resource\":{\"objectType\":\"${res_type}\",\"objectId\":\"${res_id}\"},\"relation\":\"${relation}\",\"subject\":${subj_obj}}}]}")
                if [ "$resp" = "200" ]; then
                  echo "  OK: ${resource}#${relation}@${subject}"
                else
                  echo "  FAIL($resp): ${resource}#${relation}@${subject}"
                fi
              done < /config/fixtures.txt
              echo "Done"
          env:
            - name: SPICEDB_HOST
              value: "dev"
            - name: SPICEDB_HTTP_PORT
              value: "8443"
            - name: SPICEDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spicedb-token
                  key: SPICEDB_TOKEN
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: spicedb-config-files
      restartPolicy: OnFailure
