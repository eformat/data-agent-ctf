---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-certgen
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-certgen
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes/custom-host"]
    verbs: ["create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-certgen
subjects:
  - kind: ServiceAccount
    name: openshell-certgen
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-certgen
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshell-certgen-ingress
subjects:
  - kind: ServiceAccount
    name: openshell-certgen
    namespace: openshell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-reader
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-route-patch
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openshell-certgen
      containers:
        - name: patch-routes
          image: quay.io/eformat/openshell-deployer:latest
          env:
            - name: HOME
              value: /tmp
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              APPS_DOMAIN=$(oc get ingresses.config cluster -o jsonpath='{.spec.domain}' 2>/dev/null || echo "apps.example.com")

              echo "=== Waiting for server TLS secret ==="
              for i in $(seq 1 30); do
                if oc get secret openshell-server-tls -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}' 2>/dev/null | base64 -d | openssl x509 -noout 2>/dev/null; then
                  echo "Secret ready"
                  break
                fi
                echo "  waiting... ($i/30)"
                sleep 5
              done

              CA=$(oc get secret openshell-server-tls -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}' | base64 -d)
              CA_JSON=$(echo "$CA" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

              echo "=== Patching routes ==="
              for route in retail-finance retail-sales retail-ops; do
                HOST="${route}.${APPS_DOMAIN}"
                echo "  ${route} -> ${HOST}"
                oc patch route "$route" -n "$NAMESPACE" --type=merge \
                  -p "{\"spec\":{\"host\":\"${HOST}\",\"tls\":{\"destinationCACertificate\":${CA_JSON}}}}" 2>&1 || echo "  (route not found)"
              done
              echo "=== Done ==="
