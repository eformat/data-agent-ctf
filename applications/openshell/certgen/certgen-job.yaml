---
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-route-patch
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openshell-certgen
      containers:
        - name: patch-routes
          image: quay.io/eformat/openshell-deployer:latest
          env:
            - name: HOME
              value: /tmp
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              APPS_DOMAIN=$(oc get ingresses.config cluster -o jsonpath='{.spec.domain}' 2>/dev/null || echo "apps.example.com")

              echo "=== Waiting for server TLS CA cert ==="
              CA=""
              for i in $(seq 1 60); do
                CA=$(oc get secret openshell-server-tls -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}' 2>/dev/null | base64 -d 2>/dev/null || true)
                if [ -n "$CA" ] && echo "$CA" | grep -q "BEGIN CERTIFICATE"; then
                  echo "CA cert ready"
                  break
                fi
                echo "  waiting for CA cert... ($i/60)"
                sleep 5
              done

              if [ -z "$CA" ] || ! echo "$CA" | grep -q "BEGIN CERTIFICATE"; then
                echo "ERROR: CA cert not available after 5 minutes — skipping route patch"
                exit 1
              fi

              CA_JSON=$(echo "$CA" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

              echo "=== Patching routes ==="
              for route in retail-finance retail-sales retail-ops; do
                HOST="${route}.${APPS_DOMAIN}"
                echo "  ${route} -> ${HOST}"
                oc patch route "$route" -n "$NAMESPACE" --type=merge \
                  -p "{\"spec\":{\"host\":\"${HOST}\",\"tls\":{\"destinationCACertificate\":${CA_JSON}}}}" 2>&1 || echo "  (route not found)"
              done
              echo "=== Done ==="
