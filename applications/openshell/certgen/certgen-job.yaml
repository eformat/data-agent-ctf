---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-certgen
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-certgen
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes/custom-host"]
    verbs: ["create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-certgen
subjects:
  - kind: ServiceAccount
    name: openshell-certgen
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-certgen
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-route-patch
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 360
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openshell-certgen
      containers:
        - name: patch-routes
          image: quay.io/eformat/openshell-deployer:latest
          env:
            - name: HOME
              value: /tmp
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

              echo "=== Waiting for server TLS CA cert ==="
              CA=""
              for i in $(seq 1 60); do
                CA=$(oc get secret openshell-server-tls -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}' 2>/dev/null | base64 -d 2>/dev/null || true)
                if [ -n "$CA" ] && echo "$CA" | grep -q "BEGIN CERTIFICATE"; then
                  echo "CA cert ready"
                  break
                fi
                echo "  waiting for CA cert... ($i/60)"
                sleep 5
              done

              if [ -z "$CA" ] || ! echo "$CA" | grep -q "BEGIN CERTIFICATE"; then
                echo "ERROR: CA cert not available after 5 minutes"
                exit 1
              fi

              CA_JSON=$(echo "$CA" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

              echo "=== Patching routes with destinationCACertificate ==="
              for route in retail-finance retail-sales retail-ops; do
                if oc get route "$route" -n "$NAMESPACE" 2>/dev/null; then
                  oc patch route "$route" -n "$NAMESPACE" --type=merge \
                    -p "{\"spec\":{\"tls\":{\"destinationCACertificate\":${CA_JSON}}}}" 2>&1
                  echo "  ${route}: patched"
                else
                  echo "  ${route}: not found (skipping)"
                fi
              done
              echo "=== Done ==="
