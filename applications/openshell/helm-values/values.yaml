---
image:
  repository: quay.io/eformat/openshell-gateway
  tag: 0.0.62-h2ws
certManager:
  enabled: true
server:
  auth:
    allowUnauthenticatedUsers: true
  tls:
    clientCaSecretName: ""
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsUser: 1000
service:
  type: ClusterIP
tolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Exists
