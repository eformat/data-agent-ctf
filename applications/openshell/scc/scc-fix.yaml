---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-sandbox-privileged
  namespace: openshell
subjects:
  - kind: ServiceAccount
    name: openshell-sandbox
    namespace: openshell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-authbridge-scc-privileged
  namespace: openshell
subjects:
  - kind: ServiceAccount
    name: retail-finance-mcp
    namespace: openshell
  - kind: ServiceAccount
    name: retail-sales-mcp
    namespace: openshell
  - kind: ServiceAccount
    name: retail-ops-mcp
    namespace: openshell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
