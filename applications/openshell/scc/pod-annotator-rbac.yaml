---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-pod-annotator
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-pod-annotator
subjects:
  - kind: ServiceAccount
    name: openshell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-pod-annotator
