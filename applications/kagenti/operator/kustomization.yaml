#     helm:
#       valuesObject:
#         openshift: true
#         components:
#           agentOperator:
#             enabled: true
#           agentNamespaces:
#             enabled: false
#           mcpGateway:
#             enabled: false
#           ui:
#             enabled: false
resources: []
