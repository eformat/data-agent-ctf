---
# Override kagenti-authbridge SCC to allow spc_t SELinux context.
# The helm chart hardcodes seLinuxContext.type: MustRunAs which prevents
# the proxy-init container from running iptables (needs spc_t).
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: kagenti-authbridge
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
allowedCapabilities:
  - NET_ADMIN
  - NET_RAW
defaultAddCapabilities: []
fsGroup:
  type: RunAsAny
groups:
  - system:serviceaccounts:team1
  - system:serviceaccounts:team2
requiredDropCapabilities:
  - MKNOD
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - runtime/default
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - csi
  - downwardAPI
  - emptyDir
  - ephemeral
  - persistentVolumeClaim
  - projected
  - secret
