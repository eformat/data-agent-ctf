---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-openshell-crd
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/eformat/data-agent-ctf.git
    targetRevision: main
    path: applications/openshell/crd
  destination:
    server: https://kubernetes.default.svc
    namespace: data-agent-ctf
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-openshell
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/nvidia/openshell/helm-chart
      chart: openshell
      targetRevision: "0.0.62"
      helm:
        valuesObject:
          fullnameOverride: openshell
          image:
            repository: quay.io/eformat/openshell-gateway
            tag: 0.0.62-h2ws
          certManager:
            enabled: true
            serverDnsNames:
              - openshell
              - openshell.data-agent-ctf.svc
              - openshell.data-agent-ctf.svc.cluster.local
              - localhost
              - openshell.localhost
              - "*.openshell.localhost"
          server:
            auth:
              allowUnauthenticatedUsers: true
            tls:
              clientCaSecretName: ""
          podSecurityContext:
            fsGroup:
          securityContext:
            runAsUser:
            runAsNonRoot: true
          service:
            type: ClusterIP
          tolerations:
            - effect: NoSchedule
              key: nvidia.com/gpu
              operator: Exists
    - repoURL: https://github.com/eformat/data-agent-ctf.git
      targetRevision: main
      path: applications/openshell/routes
    - repoURL: https://github.com/eformat/data-agent-ctf.git
      targetRevision: main
      path: applications/openshell/netpol
    - repoURL: https://github.com/eformat/data-agent-ctf.git
      targetRevision: main
      path: applications/openshell/scc
  destination:
    server: https://kubernetes.default.svc
    namespace: data-agent-ctf
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
