---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-console-plugin
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://eformat.github.io/helm-charts
      chart: openshell-authz-plugin
      targetRevision: "0.1.0"
      helm:
        releaseName: openshell-authz-plugin
        valueFiles:
          - $values/applications/console-plugin/values.yaml
    - repoURL: https://github.com/eformat/data-agent-ctf.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openshell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
