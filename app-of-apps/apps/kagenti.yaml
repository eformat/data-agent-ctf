---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-kagenti-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/kagenti/kagenti.git
      targetRevision: v0.7.0-alpha.3
      path: charts/kagenti
      helm:
        releaseName: kagenti
        valuesObject:
          openshift: true
          keycloak:
            publicUrl: "https://keycloak-openshell.apps.prelude-m6wl4-jf54l.sandbox1832.opentlc.com"
            realm: retail-ctf
            namespace: openshell
          components:
            agentOperator:
              enabled: true
            agentNamespaces:
              enabled: false
            mcpGateway:
              enabled: false
            ui:
              enabled: false
            istio:
              enabled: false
            phoenix:
              enabled: false
            mlflow:
              enabled: false
          kagenti-operator-chart:
            controllerManager:
              container:
                image:
                  tag: 0.3.0-alpha.5
                args:
                  - "--leader-elect"
                  - "--metrics-bind-address=:8443"
                  - "--health-probe-bind-address=:8081"
                  - "--webhook-cert-path=/tmp/k8s-webhook-server/serving-certs"
                  - "--config-path=/etc/kagenti/config.yaml"
                  - "--feature-gates-path=/etc/kagenti/feature-gates/feature-gates.yaml"
                  - "--enable-client-registration=true"
                  - "--keycloak-admin-secret-namespace=openshell"
                  - "--keycloak-realm=retail-ctf"
                  - "--client-auth-type=client-secret"
            signatureVerification:
              spireTrustDomain: ""
            featureGates:
              globalEnabled: true
              envoyProxy: true
              injectTools: true
              perWorkloadConfigResolution: false
            defaults:
              images:
                envoyProxy: ghcr.io/kagenti/kagenti-extensions/authbridge-envoy:v0.6.0-alpha.9
                authbridge: ghcr.io/kagenti/kagenti-extensions/authbridge:v0.6.0-alpha.9
                authbridgeLite: ghcr.io/kagenti/kagenti-extensions/authbridge-lite:v0.6.0-alpha.9
                proxyInit: ghcr.io/kagenti/kagenti-extensions/proxy-init:v0.6.0-alpha.9
                pullPolicy: IfNotPresent
              proxy:
                iptablesCmd: iptables-legacy
  destination:
    server: https://kubernetes.default.svc
    namespace: kagenti-system
  ignoreDifferences:
    - group: security.openshift.io
      kind: SecurityContextConstraints
      name: kagenti-authbridge
      jsonPointers:
        - /seLinuxContext
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
