---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-kagenti-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/kagenti/kagenti.git
      targetRevision: v0.7.0-alpha.3
      path: charts/kagenti
      helm:
        releaseName: kagenti
        valuesObject:
          openshift: true
          components:
            agentOperator:
              enabled: true
            agentNamespaces:
              enabled: false
            mcpGateway:
              enabled: false
            ui:
              enabled: false
            istio:
              enabled: false
            phoenix:
              enabled: false
            mlflow:
              enabled: false
          kagenti-operator-chart:
            controllerManager:
              container:
                image:
                  tag: 0.3.0-alpha.5
            keycloak:
              adminSecretNamespace: openshell
              realm: retail-ctf
            signatureVerification:
              spireTrustDomain: ""
            featureGates:
              globalEnabled: true
              envoyProxy: true
              injectTools: true
              perWorkloadConfigResolution: false
            defaults:
              images:
                envoyProxy: ghcr.io/kagenti/kagenti-extensions/authbridge-envoy:v0.6.0-alpha.9
                authbridge: ghcr.io/kagenti/kagenti-extensions/authbridge:v0.6.0-alpha.9
                authbridgeLite: ghcr.io/kagenti/kagenti-extensions/authbridge-lite:v0.6.0-alpha.9
                proxyInit: ghcr.io/kagenti/kagenti-extensions/proxy-init:v0.6.0-alpha.9
                pullPolicy: IfNotPresent
  destination:
    server: https://kubernetes.default.svc
    namespace: kagenti-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
