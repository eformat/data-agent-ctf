apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-keycloak
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/eformat/data-agent-ctf.git
    targetRevision: main
    path: applications/keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: data-agent-ctf
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
