---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-openshell-crd
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.gitRepo }}
    targetRevision: {{ .Values.gitRevision }}
    path: applications/openshell/crd
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf-openshell
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: oci://quay.io/eformat/openshell-helm-chart
      targetRevision: "0.0.81"
      helm:
        releaseName: openshell
        valueFiles:
          - $values/applications/openshell/helm-values/values.yaml
        valuesObject:
          certManager:
            enabled: true
            serverDnsNames:
              - openshell
              - openshell.{{ .Values.namespace }}.svc
              - openshell.{{ .Values.namespace }}.svc.cluster.local
              - localhost
              - openshell.localhost
              - "*.openshell.localhost"
              - "*.{{ .Values.appsDomain }}"
              - openshell.{{ .Values.appsDomain }}
          pkiInitJob:
            serverDnsNames:
              - "*.{{ .Values.appsDomain }}"
              - openshell.{{ .Values.appsDomain }}
          server:
            oidc:
              issuer: {{ include "ctf.keycloakIssuer" . | quote }}
    - repoURL: {{ .Values.gitRepo }}
      targetRevision: {{ .Values.gitRevision }}
      ref: values
    - repoURL: {{ .Values.gitRepo }}
      targetRevision: {{ .Values.gitRevision }}
      path: applications/openshell/certgen
    - repoURL: {{ .Values.gitRepo }}
      targetRevision: {{ .Values.gitRevision }}
      path: applications/openshell/routes
      helm:
        valuesObject:
          appsDomain: {{ .Values.appsDomain }}
    - repoURL: {{ .Values.gitRepo }}
      targetRevision: {{ .Values.gitRevision }}
      path: applications/openshell/netpol
    - repoURL: {{ .Values.gitRepo }}
      targetRevision: {{ .Values.gitRevision }}
      path: applications/openshell/scc
  ignoreDifferences:
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/tls/destinationCACertificate
        - /spec/host
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
