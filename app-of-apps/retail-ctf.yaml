---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-ctf
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/eformat/data-agent-ctf.git
    targetRevision: main
    path: app-of-apps
    helm:
      releaseName: retail-ctf
  destination:
    server: https://kubernetes.default.svc
    namespace: openshell
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
